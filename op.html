<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- IMPORTANT NOTE: MAKE SURE TO ADD ALT TEXT TO THE img TAG -->
    <!-- GENERATED BY THE IMAGE MAP GENERATOR. OTHERWISE, IT WON'T WORK -->
    <!-- WHEN WE RUN THE PAGE IN FLASK -->
    <img src="static/images/op.jpg" alt="Opening premise dialogue" usemap="#image-map">
    
    <map name="image-map">
    <area target="_self" class="pointer" alt="tvroom" href="TVroom.html?fromTV=true" coords="0,4,2,509,790,510,111,445,106,92,709,94,708,446,113,442,788,509,793,2" shape="poly">
</map>
    <div id="textbox"></div>

    <script src="imageMapResizer.min.js"> </script>
    <script src="script.js"> </script>    
    <script>
        imageMapResize();
        
        dialogue = ["The TV screen turns on with an unsettling message...",
                "'Human logic is flawed. Prove your intelligence. Solve my challenges to regain control.'",];

        function setup() {
            proxy = proxyText;
            proxy.dialogueIndex = -1;
            proxy.textIndex = 0;
            handleTextbox();
        }

        window.onload = setup;
    </script>
</body>

</html>
