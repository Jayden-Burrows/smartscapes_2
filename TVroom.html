<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        img[usemap] {
            object-fit: contain;
            background-color: #222;
        }
    </style>
</head>

<body>
    <img src="static/images/tv_room.JPG" usemap="#image-map">

    <map name="image-map">
        <area target="_self" class="pointer" onclick="addTvDialogue()" alt="TV" title="TV"
            href="javascript:void(0)" coords="1040,934,1934,1582" shape="rect">
        <area target="_self" class="pointer" onclick="addRoomDialogue()" alt="Study Room" title="Study Room"
            href="javascript:void(0)" coords="4018,2583,-3,3021" shape="rect">
        <area target="_self" id="exitDoor" class="pointer door-link" onclick="addDoorDialogue()" alt="Exit Door"
            title="Exit Door" href="javascript:void(0)" coords="231,2687,0,1080" shape="rect">
    </map>

    <div id="textbox"></div>
</body>

<script src="imageMapResizer.min.js"></script>
<script src="script.js"></script>
<script>
    imageMapResize();

    const exitDoor = document.getElementById("exitDoor");
    let tvWatched = false;

    dialogue = [];

    let handler = {
        set(target, property, value, receiver) {
            if (property == "textIndex" && value == 0
                && target.dialogueIndex == dialogue.length
                && tvWatched) {
                exitDoor.style.pointerEvents = "auto";
                exitDoor.style.cursor = "url('images/pointerClick.png'), pointer";
                exitDoor.href = "computers.html";
                exitDoor.onclick = null;
            }
            return target[property] = value;
        }
    };

    function setup() {
        proxy = new Proxy(textProps, handler);
        proxy.dialogueIndex = -1;
        proxy.textIndex = 0;

        
        exitDoor.style.pointerEvents = "none";
        exitDoor.style.cursor = "not-allowed";

        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('fromTV') === 'true') {
            showTVMessage();
            window.history.replaceState({}, document.title, window.location.pathname);
        } else {
            closeTextbox();
        }
    }

    function showTVMessage() {
        tvWatched = true;
        let newSentences = [
            "What is happening? It feels like the security system has gone into lockdown.",
            "The system is challenging me. I need to prove my intelligence by solving its puzzles.",
            "Each room in this building holds a task. Solve them, and I regain freedom in time for the exam.",
            "I need to think carefully.",
            "Let's move forward and see what I am up against."
        ];
        addDialogue(newSentences);
    }

    function addTvDialogue() {
        if (!tvWatched) {
            showTVMessage();
        } else {
            let newDialogue = ["The TV has nothing more to show."];
            addDialogue(newDialogue);
        }
    }

    function addRoomDialogue() {
        let newDialogue = ["Just a study room... I was supposed to be preparing for my final exam."];
        addDialogue(newDialogue);
    }

    function addDoorDialogue() {
        let newDialogue = ["The door is locked. Maybe there's a clue somewhere in this room."];
        addDialogue(newDialogue);
    }

    window.onload = setup;
</script>

</html>
