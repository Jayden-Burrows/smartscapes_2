<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        img[usemap] {
            object-fit: contain;
            background-color: #222;
        }
    </style>
</head>

<body>
    <img src="static/images/tv_room.JPG" usemap="#image-map">

   <map name="image-map">
    <area target="_self" class="pointer"  alt="TV" title="TV" href="op.html" coords="1040,934,1934,1582" shape="rect">
    <area target="_self" id="exitDoor" class="pointer door-link"  alt="Exit Door" title="Exit Door" href="computers.html" coords="231,2687,0,1080" shape="rect">

</map>

<div id="textbox"></div>

<script src="imageMapResizer.min.js"></script>
<script src="script.js"></script>
<script>
        imageMapResize();
        
         const exitDoor = document.getElementById("exitDoor");
    let tvWatched = false;

    dialogue = [];

    let handler = {
        set(target, property, value, receiver) {
            if (property == "textIndex" && value == 0
                && target.dialogueIndex == dialogue.length
                && tvWatched) {
                exitDoor.setAttribute("href", "computers.html");
                exitDoor.style.cursor = "pointer";
            }
            return target[property] = value;
        }
    };

    function setup() {
        proxy = new Proxy(textProps, handler);
        proxy.dialogueIndex = -1;
        proxy.textIndex = 0;

        
        exitDoor.removeAttribute("href");
        exitDoor.style.cursor = "not-allowed";

        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('fromTV') === 'true') {
            showTVMessage();
            window.history.replaceState({}, document.title, window.location.pathname);
        } else {
            closeTextbox();
        }
    }

    // Override enableDoor so only the proxy handler controls the exit door
    enableDoor = function() {};

    function showTVMessage() {
        tvWatched = true;
        let newSentences = [
            "What is happening? It feels like the security system has gone into lockdown.",
            "The system is challenging me. I need to prove my intelligence by solving its puzzles.",
            "Each room in this building holds a task. Solve them, and I regain freedom in time for the exam.",
            "I need to think carefully.",
            "Let's move forward and see what I am up against."
        ];
        addDialogue(newSentences);
    }

    

    window.onload = setup;
</script>

</html>
