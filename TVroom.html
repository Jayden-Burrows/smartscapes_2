<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="static/images/tv_room.JPG" usemap="#image-map">

    <map name="image-map">
        <area target="_self" class="pointer" alt="TV" title="TV" href="op.html"
            coords="1062,948,1895,1051,1895,1479,1097,1557" shape="poly">
        <area target="_self" id="exitDoor" class="pointer door-link" alt="Exit Door" title="Exit Door"
            href="computers.html" coords="0,1050,246,2721,-3,2785" shape="poly">


    </map>

    <div id="textbox"></div>

    <script src="imageMapResizer.min.js"></script>
    <script src="game_api.js"></script>
    <script src="room_map.js"></script>
    <script src="script.js"></script>
    <script>
        imageMapResize();

        const exitDoor = document.getElementById("exitDoor");
        let tvWatched = false;

        let handler = {
            set(target, property, value, receiver) {
                target[property] = value;
                if (property == "textIndex" && value == 0
                    && target.dialogueIndex == dialogue.length
                    && tvWatched) {
                    exitDoor.onclick = null;
                    exitDoor.style.cursor = "pointer";
                }
                return true;
            }
        };

        function setup() {
            if (!SmartScapesAPI.requireSession()) {
                return;
            }
            SmartScapesAPI.enterRoom("TVroom");
            proxy = new Proxy(textProps, handler);
            proxy.dialogueIndex = -1;
            proxy.textIndex = 0;


            exitDoor.onclick = function (e) { e.preventDefault(); };
            exitDoor.style.cursor = "not-allowed";

            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('fromTV') === 'true') {
                showTVMessage();
            } else {
                dialogue = [
                    "While studying for your upcoming exam, you hear the door lock and the TV start to crackle.",
                    "A voice booms from the speakers: 'Well, well, well... someone booked an ENTIRE study room just for themselves.'",
                    "The security system has gone into lockdown. This can't be good."
                ];
                handleTextbox();
            }
        }

        // Override enableDoor so only the proxy handler controls the exit door
        enableDoor = function () { };

        function showTVMessage() {
            tvWatched = true;
            let newSentences = [
                "The TV flickers on.",
                "Each room in this building holds a task. Solve them, and you will regain your freedom in time for the exam.",
                "You hear the door unlock.",
                "...Okay. I need to focus and get out of here.",
                "Let's move forward and see what I'm up against."
            ];
            addDialogue(newSentences);
        }

        function addTvDialogue() {
            if (!tvWatched) {
                showTVMessage();
            } else {
                let newDialogue = ["The TV has nothing more to show."];
                addDialogue(newDialogue);
            }
        }

        function addRoomDialogue() {
            let newDialogue = ["Just a study room... I was supposed to be preparing for my final exam."];
            addDialogue(newDialogue);
        }

        function addDoorDialogue() {
            if (!tvWatched) {
                let newDialogue = ["The door is locked. Maybe there's a clue somewhere in this room."];
                addDialogue(newDialogue);
            } else {
                SmartScapesAPI.markVisited("TVroom");
                exitDoor.onclick = null;
                exitDoor.classList.add("pointer");
            }
        }

        window.onload = setup;
    </script>

</html>
