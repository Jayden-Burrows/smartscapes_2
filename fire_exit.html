<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #fireAlarmPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #b71c1c;
            border: 6px ridge #d32f2f;
            border-radius: 10px;
            width: 35vw;
            padding: 20px;
            visibility: hidden;
            text-align: center;
        }

        #fireAlarmPanel h2 {
            color: white;
            font-family: "Pixelify Sans", sans-serif;
            margin: 0 0 10px 0;
            font-size: 1.8vw;
        }

        #fireAlarmPanel p {
            color: #ffcdd2;
            font-family: "Pixelify Sans", sans-serif;
            font-size: 1.2vw;
            margin: 5px 0;
        }

        #pullHandle {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            background-color: #fff;
            color: #b71c1c;
            font-family: "Pixelify Sans", sans-serif;
            font-size: 1.4vw;
            font-weight: bold;
            border: 3px solid #ffcdd2;
            border-radius: 8px;
            cursor: url('static/images/pointerClick.png'), pointer;
            transition: background-color 0.2s, transform 0.2s;
        }

        #pullHandle:hover {
            background-color: #ffcdd2;
            transform: scale(1.05);
        }

        #closeAlarmPanel {
            position: absolute;
            top: 8px;
            right: 10px;
            width: 30px;
            height: 30px;
            padding: 3px;
            border-radius: 8px;
            font-size: larger;
            text-align: center;
            background-color: #ffcdd2;
            color: #b71c1c;
            font-weight: bold;
            border: none;
            cursor: url('static/images/pointerClick.png'), pointer;
        }
    </style>
</head>

<body>
    <img src="static/images/fire_exit.JPG" usemap="#image-map">

    <map name="image-map">
        <area target="_self" id="exitDoor" class="pointer" onclick="addDoorDialogue()" alt="Exit Door"
            title="Exit Door" href="javascript:void(0)" coords="1923,1610,2589,3002" shape="rect">
        <area target="_self" id="fireExitStairs" class="pointer" onclick="addStairsDialogue()" alt="Fire Exit Stairs"
            title="Fire Exit Stairs" href="javascript:void(0)" coords="3009,2746,4284,4180,4050,4846,2858,3363,2914,2758" shape="poly">
        <area target="_self" id="fireAlarmBtn" class="pointer" onclick="showFireAlarm()" alt="Fire Alarm"
            title="Fire Alarm" href="javascript:void(0)" coords="2634,2256,2703,2335" shape="rect">
    </map>

    <div id="textbox"></div>

    <div id="modal">
        <p id="question"> What is the order of the box model outer to inner? </p>
        <input id="input" type="text">
        <button id="answerBtn" onclick="checkAnswer()"> Submit </button>
    </div>

    <div id="fireAlarmPanel">
        <button class="pointer" id="closeAlarmPanel" onclick="closeAlarmPanel()">X</button>
        <h2>🔥 FIRE ALARM 🔥</h2>
        <p>In case of emergency, pull the handle.</p>
        <p>Think before you act — do you know Web Programming?</p>
        <button id="pullHandle" onclick="pullAlarm()">PULL</button>
    </div>
</body>

<script src="imageMapResizer.min.js"></script>
<script src="game_api.js"></script>
<script src="room_map.js"></script>
<script src="script.js"></script>
<script>
    imageMapResize();

    const fireAlarmPanel = document.getElementById("fireAlarmPanel");
    const exitDoor = document.getElementById("exitDoor");

    let alarmPulled = false;
    let fallbackAnswers = ["margin border padding content", "margin,border,padding,content"];

    async function loadRoomQuestion() {
        const fallbackQuestion = "What is the order of the box model outer to inner?";
        const payload = await SmartScapesAPI.resolveQuestion("fire_exit", fallbackQuestion, fallbackAnswers, "question");
        fallbackAnswers = payload.fallbackAnswers;
    }

    dialogue = [
        "You find yourself in a hallway near the fire exit.",
        "The door is locked tight. There must be another way to get it open...",
        "Maybe that fire alarm on the wall could help."
    ];

    let handler = {
        set(target, property, value, receiver) {
            if (property == "textIndex" && value == 0
                && target.dialogueIndex == dialogue.length
                && alarmPulled) {
                modal.style.visibility = "visible";
                alarmPulled = false;
            }
            return target[property] = value;
        }
    };

    function setup() {
        if (!SmartScapesAPI.requireSession()) {
            return;
        }
        proxy = new Proxy(textProps, handler);
        proxy.dialogueIndex = -1;
        proxy.textIndex = 0;
        loadRoomQuestion();
        handleTextbox();
    }

    function showFireAlarm() {
        fireAlarmPanel.style.visibility = "visible";
    }

    function closeAlarmPanel() {
        fireAlarmPanel.style.visibility = "hidden";
    }

    function pullAlarm() {
        alarmPulled = true;
        fireAlarmPanel.style.visibility = "hidden";
        let newDialogue = [
            "You pull the fire alarm handle!",
            "A screen on the alarm lights up with a question...",
            "Answer correctly to unlock the fire exit."
        ];
        addDialogue(newDialogue);
    }

    async function checkAnswer() {
        let answer = document.getElementById("input").value.trim().toLowerCase().replace(/\s/g, "");
        const apiCorrect = await SmartScapesAPI.validateAnswer("fire_exit", answer, fallbackAnswers);
        const localCorrect = answer.includes("margin") && answer.includes("border") && answer.includes("padding") && answer.includes("content");
        if (apiCorrect || localCorrect) {
            modal.style.visibility = "hidden";
            let newDialogue = [
                "Correct! Margin, Border, Padding, Content.",
                "The fire exit door clicks open!",
                "You can now leave through the exit."
            ];
            addDialogue(newDialogue);
            exitDoor.href = "jittery_joes.html";
            exitDoor.onclick = null;
        } else {
            let newDialogue = [
                "That's not right. Think about how the box model works..."
            ];
            modal.style.visibility = "hidden";
            addDialogue(newDialogue);
        }
    }

    function addDoorDialogue() {
        let newDialogue = ["The door is locked. You need to find another way out."];
        addDialogue(newDialogue);
    }

    function addStairsDialogue() {
        let newDialogue = ["The stairs are blocked off. You can't go that way."];
        addDialogue(newDialogue);
    }

    window.onload = setup;
</script>

</html>
