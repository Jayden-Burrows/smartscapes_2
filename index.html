<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap');
        
        body {
            margin: 0;
        }

        img {
            margin: 0;
            width: 100vw;
            height: 100vh;
        }

        #consent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            color:#2b2d46;
            background-color: #9593a7;
            border: 3px solid #2b2d46;
            padding: 5px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            width: 60vw;
            height: 80vh;
            border-radius: 18px;
            padding: 10px;
        }
        #consent iframe{
            width: 100%;
            height: 80%;
        }

        .accept {
            margin-top: 10px;
            border-radius: 3px;
            border: none;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #2b2d46d0;
        }

        #title {
            font-family: "Pixelify Sans", sans-serif;
            font-size: 2.5em;
            color: white;
            position: absolute;
            top: calc(27%);
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #controls {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 25vw;
        }

        #controls > * {
            width: 100%;
        }

        #controls button {
            padding: 0.25em;
            font-family: "Pixelify Sans", sans-serif;
            font-weight: 400;
        }

        .trapezoid {
            border-bottom: 1em solid #9593a7;
            border-left: 1em solid transparent;
            border-right: 1em solid transparent;
            height: 0;
        }

        .upside-down {
            transform: rotate(180deg);
        }
    </style>
</head>

<body>
    <img src="static/images/index.png" alt="Outside of MLC">

    <div id="overlay"></div>

    <div id="consent">
        <h1> Research Consent </h1>
        <iframe src="static/VIPR_SmartScapes_Consent_Form.pdf"></iframe>
        <button class="pointer accept" onclick="acceptConsent()">Accept</button>
    </div>

    <h1 id="title">SMARTSCAPES</h1>

    <div id="controls">
        <div class="trapezoid"></div>
        <button class="pointer" onclick="goTo1b()"> PLAY </button>
        <button class="pointer" onclick="about()"> ABOUT </button>
        <button class="pointer" onclick="showTips()"> HOW TO PLAY</button>
        <div class="trapezoid upside-down"></div>
    </div>

    <div id="textbox"></div>

    <script src="imageMapResizer.min.js"> </script>
    <script src="script.js"> </script>
    <script>
        imageMapResize();

        const consent = document.getElementById("consent");
        const controls = document.getElementById("controls");

        localStorage.setItem("checkedBulletin", false);
        localStorage.setItem("premiseOver", false);

        function acceptConsent() {
            consent.style.display = "none";
            showControls();
        }

        function showControls() {
            controls.style.display = "flex";
            controls.style.flexDirection = "column";
            controls.style.alignItems = "center";
            controls.style.gap = "3vh";
        }

        function goTo1b() {
            window.location.href = "TVroom.html";
        }

        function about() {
            let newSentences = [
                "This study is evaluating if the design of study tools like Quizlet can be improved with GenAI and gamification to further enhance computer science students’ retention of reviewed course material.",
                "Your involvement in the study is voluntary, and you may choose not to participate or to stop at any time without penalty or loss of benefits to which you are otherwise entitled."
            ];

            addDialogue(newSentences);
        }

        function showTips() {
            let newSentences = ["Hover your mouse around the screen and look for clickable elements.",
                "Make sure to read the textboxes!"
            ];
            addDialogue(newSentences);
        }

        closeTextbox();

        function setup() {
            proxy = proxyText;
            proxy.dialogueIndex = -1;
            proxy.textIndex = 0;
            dialogue = [];
        }

        window.onload = setup;
    </script>
</body>

</html>
