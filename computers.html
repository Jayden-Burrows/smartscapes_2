<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        img[usemap] {
            object-fit: contain;
            background-color: #222;
        }
    </style>
</head>

<body>
 <!-- Image Map Generated by http://www.image-map.net/ -->
<img src="static/images/computers.JPG" usemap="#image-map">

<map name="image-map">
    <area target="" alt="" title="" href="javascript:void(0)" coords="959,1154,1357,1418" shape="rect">
    <area target="" alt="" title="" href="javascript:void(0)" coords="0,2478,4015,2998" shape="rect">
    <area target="" alt="" title="" href="javascript:void(0)" coords="15,23,478,2483" shape="rect">
</map>

    <div id="textbox"></div>
    <div id="modal">
        <p id="question">What does CPU stand for?</p>
        <input id="input" type="text">
        <button id="answerBtn" onclick="checkAnswer()">Submit</button>
    </div>
</body>

<script src="imageMapResizer.min.js"></script>
<script src="script.js"></script>
<script>
    imageMapResize();

    const exitDoor = document.getElementById("exitDoor");

    let puzzleOpened = false;
    let puzzleSolved = false;

    dialogue = [
        "Two computer stations... maybe one of them has something useful.",
        "I should check the computers for clues."
    ];

    let handler = {
        set(target, property, value, receiver) {
            if (property == "textIndex" && value == 0
                && target.dialogueIndex == dialogue.length
                && puzzleOpened) {
                modal.style.visibility = "visible";
                puzzleOpened = false;
            }
            if (property == "textIndex" && value == 0
                && target.dialogueIndex == dialogue.length
                && puzzleSolved) {
                exitDoor.href = "fire_exit.html";
                exitDoor.onclick = null;
            }
            return target[property] = value;
        }
    };

    function setup() {
        proxy = new Proxy(textProps, handler);
        proxy.dialogueIndex = -1;
        proxy.textIndex = 0;

        // Override enableDoor so only the proxy handler controls the exit
        enableDoor = function () {};

        handleTextbox();
    }

    window.onload = setup;
</script>

</html>
