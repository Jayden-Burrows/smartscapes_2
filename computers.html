<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        img[usemap] {
            object-fit: contain;
            background-color: #222;
        }
    </style>
</head>

<body>
    <img src="static/images/computers.JPG" alt="Computer lab with two workstations" usemap="#image-map">

    <map name="image-map">
        <area target="_self" id="leftComputer" class="pointer" onclick="clickLeftComputer()"
            alt="Left Computer" title="Left Computer" href="javascript:void(0)"
            coords="959,1154,1357,1418" shape="rect">
        <area target="_self" class="pointer door-link" id="exitDoor"
            alt="Exit" title="Exit" href="javascript:void(0)" onclick="clickDoor()"
            coords="15,23,478,2483" shape="rect">
    </map>

    <div id="textbox"></div>
    <div id="modal">
        <p id="question">What does CPU stand for?</p>
        <input id="input" type="text">
        <button id="answerBtn" onclick="checkAnswer()">Submit</button>
    </div>
</body>

<script src="imageMapResizer.min.js"></script>
<script src="script.js"></script>
<script>
    imageMapResize();

    const exitDoor = document.getElementById("exitDoor");

    let puzzleOpened = false;
    let puzzleSolved = false;

    dialogue = [
        "Two computer stations... maybe one of them has something useful.",
        "I should check the computers for clues."
    ];

    let handler = {
        set(target, property, value, receiver) {
            if (property == "textIndex" && value == 0
                && target.dialogueIndex == dialogue.length
                && puzzleOpened) {
                modal.style.visibility = "visible";
                puzzleOpened = false;
            }
            if (property == "textIndex" && value == 0
                && target.dialogueIndex == dialogue.length
                && puzzleSolved) {
                exitDoor.href = "fire_exit.html";
                exitDoor.onclick = null;
            }
            return target[property] = value;
        }
    };

    function setup() {
        proxy = new Proxy(textProps, handler);
        proxy.dialogueIndex = -1;
        proxy.textIndex = 0;

        // Override enableDoor so only the proxy handler controls the exit
        enableDoor = function () {};

        handleTextbox();
    }

    function clickDoor() {
        let newDialogue = ["The door is locked. I need to solve the computer's challenge first."];
        addDialogue(newDialogue);
    }

    function clickLeftComputer() {
        if (puzzleSolved) return;
        puzzleOpened = true;
        let newDialogue = [
            "There's a program running on this computer...",
            "It looks like a security challenge. I need to answer correctly to proceed."
        ];
        addDialogue(newDialogue);
    }

    function checkAnswer() {
        const input = document.getElementById("input");
        const answer = input.value.trim().toLowerCase();
        if (answer === "central processing unit") {
            modal.style.visibility = "hidden";
            puzzleSolved = true;
            let newDialogue = [
                "That's correct! The system accepted my answer.",
                "It looks like the exit on the left has been unlocked. Time to move on."
            ];
            addDialogue(newDialogue);
        } else {
            input.value = "";
            let newDialogue = ["That doesn't seem right. Let me try again."];
            addDialogue(newDialogue);
        }
    }

    window.onload = setup;
</script>

</html>
