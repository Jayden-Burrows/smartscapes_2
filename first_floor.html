<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #flicker-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 20, 60, 1);
            pointer-events: none;
            z-index: 9999;
            opacity: 0;
            transition: none;
        }

        @keyframes flicker {
            0%   { opacity: 0; }
            5%   { opacity: 0.95; }
            10%  { opacity: 0.3; }
            15%  { opacity: 0.85; }
            25%  { opacity: 0.1; }
            35%  { opacity: 0.9; }
            40%  { opacity: 0.4; }
            50%  { opacity: 0.75; }
            55%  { opacity: 0.2; }
            65%  { opacity: 0.6; }
            75%  { opacity: 0.15; }
            85%  { opacity: 0.08; }
            92%  { opacity: 0.03; }
            100% { opacity: 0; }
        }
    </style>
</head>

<body>
    <img src="static/images/first_floor_main_exit.JPG" usemap="#first-floor-map">

    <map name="first-floor-map">
        <area target="_self" id="door1" class="pointer door-link" alt="Main Exit" title="Main Exit" href="final.html" coords="2224,1487,3170,2651"
            shape="rect">
        <area target="_self" id="door2" class="pointer door-link" alt="Main Exit" title="Main Exit" href="final.html" coords="581,2814,4,1564"
            shape="rect">
        <area target="_self" id="door3" class="pointer door-link" alt="Main Exit" title="Main Exit" href="final.html" coords="4291,1444,4661,2542"
            shape="rect">
    </map>
    <div id="textbox"></div>
    <div id="flicker-overlay"></div>
</body>
<script src="imageMapResizer.min.js"> </script>
<script src="game_api.js"></script>
<script src="room_map.js"></script>
<script src="script.js"></script>
<script>
    imageMapResize();

    const door1 = document.getElementById("door1");
    const door2 = document.getElementById("door2");
    const door3 = document.getElementById("door3");

    dialogue = [
        "The AI's voice fizzles from the speakers one last time: 'Fine... you win. But don't think this is over. I'll be smarter next time.'",
        "The main exit doors click open. Daylight floods in. Time to get out of here — and maybe still make it to that exam."
    ];

    function flickerThenUnlock() {
        const overlay = document.getElementById("flicker-overlay");
        overlay.style.animation = "flicker 3s ease-out forwards";
        setTimeout(function() {
            overlay.style.opacity = "0";
            door1.onclick = null;
            door2.onclick = null;
            door3.onclick = null;
            door1.style.cursor = "pointer";
            door2.style.cursor = "pointer";
            door3.style.cursor = "pointer";
        }, 3000);
    }

    let handler = {
        set(target, property, value, receiver) {
            target[property] = value;
            if (property === "textIndex" && value === 0
                && target.dialogueIndex === dialogue.length) {
                flickerThenUnlock();
            }
            return true;
        }
    };

    function setup() {
        if (!SmartScapesAPI.requireSession()) {
            return;
        }
        proxy = new Proxy(textProps, handler);
        proxy.dialogueIndex = -1;
        proxy.textIndex = 0;

        // Lock doors until dialogue finishes
        door1.onclick = function(e) { e.preventDefault(); };
        door2.onclick = function(e) { e.preventDefault(); };
        door3.onclick = function(e) { e.preventDefault(); };
        door1.style.cursor = "not-allowed";
        door2.style.cursor = "not-allowed";
        door3.style.cursor = "not-allowed";

        // Override enableDoor so only the proxy handler controls the doors
        enableDoor = function() {};

        handleTextbox();
    }

    window.onload = setup;
</script>

</html>
