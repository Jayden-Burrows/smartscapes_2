<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="static/images/jittery_joes_zoom_in_wide.JPG" usemap="#cafe-map">

    <map name="cafe-map">
        <area target="_self" class="pointer" onclick="showPuzzle()" alt="Cash Register" title="Cash Register"
            href="javascript:void(0)" coords="2555,1900,2800,2071" shape="rect">
        <area target="_self" class="pointer" onclick="addTvDialogue()" alt="Tv" title="Tv" href="javascript:void(0)"
            coords="2236,1393,2865,1744" shape="rect">
        <area target="_self" class="pointer" onclick="addTvDialogue()" alt="Tv" title="Tv" href="javascript:void(0)"
            coords="3221,1393,3795,1726" shape="rect">
        <area id="elevator" target="_self" class="pointer" onclick="addElevatorDialogue()" alt="Elevators" title="Elevators" href="javascript:void(0)" coords="6,1,978,2783" shape="rect">    
    </map>
    <div id="textbox"></div>
    <div id="modal">
        <p id="question"> The register springs open! A receipt inside reads: "In computing, what number system uses only 0s and 1s?" </p>
        <input id="input" type="text" placeholder="Type your answer...">
        <button id="answerBtn" onClick="checkAnswer()"> Submit </button>
    </div>
</body>
<script src="imageMapResizer.min.js"> </script>
<script src="script.js"></script>
<script>
    imageMapResize();

    const elevator = document.getElementById("elevator");

    dialogue = ["You made it down to the first floor... but of course, the elevators are disabled and every exit is sealed shut.",
        "The AI's voice crackles from a speaker overhead: 'Hungry for freedom? Solve this first...'",
        "'I have keys but open no locks. I have a drawer but hold no socks. In this café I sit and wait — tap my buttons to seal your fate.'",
        "Hmm... look around the café. What has keys and a drawer?"
    ];

    function setup() {
        handler = dialogueHandler;
        proxy = new Proxy(textProps, handler);
        proxy.dialogueIndex = -1;
        proxy.textIndex = 0;
        handleTextbox();
    }

    function addTvDialogue() {
        let newDialogue = ["Nothing here"];
        addDialogue(newDialogue);
    }

    function showPuzzle() {
        modal.style.visibility = "visible";
    }

    function checkAnswer() {
        const answer = document.getElementById("input").value.trim().toLowerCase();
        if (answer === "binary" || answer === "base 2" || answer === "base-2" || answer === "base two") {
            addCorrectDialogue();
        } else {
            alert("The AI laughs: 'Wrong! Think about how computers speak at the lowest level...'");
        }
    }

    function addCorrectDialogue() {
        modal.style.visibility = "hidden";
        let newDialogue = ["The receipt fades and new text burns across the register screen: 'ELEVATOR ACCESS RESTORED — FLOOR 1'",
            "You hear a mechanical click from the far left of the hallway. The elevators!",
            "Head to the elevators on the left side of the hall."
        ];
        addDialogue(newDialogue);
        elevator.href = "elevator.html";
        elevator.onclick = "javascript:void(0)";
    }

    function addElevatorDialogue() {
        let newDialogue = ["Nothing now"]
        addDialogue(newDialogue);
    }

    window.onload = setup;
</script>

</html>
