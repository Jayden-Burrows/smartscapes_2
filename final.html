<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartScapes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        img {
            width: 100vw;
            height: 101vh;
            margin: 0;
        }

        #container {
            visibility: hidden;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1a1a2a 0%, #0d0d15 100%);
            border: 3px solid #00ff88;
            padding: 40px;
            min-width: 200px;
            max-width: 600px;
            width: 80vw;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.5);
        }

        .visible {
            animation: show-results 1000ms 500ms forwards;
        }

        @keyframes show-results {
            from {
                visibility: hidden;
                opacity: 0;
            }

            to {
                visibility: visible;
                opacity: 100%;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #00ff88;
            color: white;
        }

        .game-logo {
            font-family: 'Orbitron', sans-serif;
            color: #00ff88;
            font-size: 24px;
            margin-bottom: 15px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.8);
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            color: #00ff88;
            font-size: 38px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            margin-bottom: 10px;
        }

        .restart-btn {
            color: white;
            border: 2px solid;
            padding: 15px 30px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .restart-btn {
            background: linear-gradient(135deg, #006688 0%, #003344 100%);
            border-color: #00ddff;
            color: #00ddff;
        }

        .restart-btn:hover {
            background: linear-gradient(135deg, #0088aa 0%, #004455 100%);
            box-shadow: 0 0 25px rgba(0, 221, 255, 0.4);
        }
    </style>
</head>

<body>
    <!-- Image Map Generated by http://www.image-map.net/ -->
    <img src="static/images/final.JPG">

    <div id="textbox"> </div>

    <div id="container">
        <div class="header">
            <div class="game-logo">SmartScapes</div>
            <h1 class="title"> Results </h1>
            <p>You've successfully escaped all rooms! There would be some stats or something here, but this is a
                placeholder for now. </p>
        </div>

        <div class="stats">
            <!-- This would have some containers with stats, etc -->
        </div>

        <button class="restart-btn" onclick="window.location.href='/'">🔄 Play Again</button>
    </div>

    <script src="imageMapResizer.min.js"> </script>
    <script src="script.js"> </script>
    <script>
        imageMapResize();

        localStorage.removeItem("checkedBulletin");
        localStorage.removeItem("premiseOver");
        
        const container = document.getElementById("container");

        dialogue = ["You finally succeeded in escaping the MLC in order to make it to your final exam.",
            "You sigh in relief.",
            "After completing the security system's challenges, you feel ready to take on your final exam.",
            "However, unfortunately for you, you realize that your midterm was on the third floor of MLC anyways, so you make the walk of shame back into the building."
        ];

        let handler = {
            set(target, property, value, receiver) {
                if (property == "textIndex" && value == 0
                    && target.dialogueIndex == dialogue.length) {
                    container.classList.add("visible");
                }
                return target[property] = value;
            }
        };

        function setup() {
            proxy = new Proxy(textProps, handler);
            proxy.dialogueIndex = -1;
            proxy.textIndex = 0;
            handleTextbox();
        }

        window.onload = setup;
    </script>
</body>

</html>
